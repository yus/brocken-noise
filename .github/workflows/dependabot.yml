version: 2
updates:
  # Enable version updates for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "sunday"
      time: "00:00"
    commit-message:
      prefix: "ci"
      include: "scope"
    labels:
      - "dependencies"
      - "automerge"
    # Target Node.js 24 compatibility
    target-branch: "main"
    open-pull-requests-limit: 5
    groups:
      actions:
        patterns:
          - "*"
