name: ⛑️ Update GitHub Actions

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  update-actions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install npm-check-updates
        run: npm install -g npm-check-updates

      - name: Check for GitHub Actions updates
        run: |
          echo "Checking for action updates..."
          grep -r "uses:" .github/workflows/ || echo "No workflows found"

      - name: Create Update PR if needed
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(ci): update GitHub Actions to latest versions"
          title: "⛑️ Update GitHub Actions (Node.js 24 compatibility)"
          body: |
            This PR updates GitHub Actions to their latest versions.
            
            **Why:** Node.js 20 is being deprecated on GitHub Actions runners.
            See: https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
          branch: actions/update-node24
          delete-branch: true
